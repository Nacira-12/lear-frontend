<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Lear Corporation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Times New Roman', Times, serif; background:#f5f5f5; color:#000; }
        .top-bar { background:#333; padding:20px 30px; }
        .header { display:flex; justify-content:space-between; align-items:center; max-width:1800px; margin:0 auto; }
        .logo h1 { font-size:32px; color:#000; }
        .logo p { font-size:14px; color:#333; }
        .btn-logout { background:#555; color:#fff; padding:10px 20px; border:none; cursor:pointer; }
        .container { max-width:1800px; margin:30px auto; padding:0 30px; }
        .quick-nav { background:#fff; padding:20px; margin-bottom:30px; display:flex; gap:15px; }
        .nav-btn { flex:1; padding:12px; border:2px solid #000; background:#fff; cursor:pointer; font-family:'Times New Roman', serif; }
        .section-title { font-size:24px; font-weight:700; margin:30px 0 20px; color:#000; border-bottom:3px solid #000; padding-bottom:10px; }
        .filters-box { background:#fff; padding:20px; margin-bottom:30px; border:2px solid #ddd; }
        .filter-row { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:15px; }
        .filter-input { padding:10px; border:2px solid #000; font-family:'Times New Roman', serif; }
        .btn-filter { padding:10px 20px; background:#000; color:#fff; border:none; cursor:pointer; }
        .stats-row { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; margin-bottom:30px; }
        .stat-box { background:#fff; padding:20px; border:2px solid #000; }
        .stat-number { font-size:40px; font-weight:700; color:#000; }
        .stat-label { font-size:13px; color:#333; margin-top:5px; }
        .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:25px; margin-bottom:30px; }
        .chart-box { background:#fff; padding:25px; border:2px solid #000; }
        .chart-title { font-size:18px; font-weight:700; color:#000; margin-bottom:15px; }
        .chart-container { height:350px; }
        .chart-full { grid-column:1/-1; }
        .chart-full .chart-container { height:500px; }
        table { width:100%; border-collapse:collapse; background:#fff; border:2px solid #000; }
        th { background:#f0f0f0; padding:12px; border:2px solid #000; color:#000; text-align:left; font-family:'Times New Roman', serif; }
        td { padding:12px; border:1px solid #ddd; color:#000; }
        tr:hover { background:#f9f9f9; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="header">
            <div class="logo">
                <h1>DASHBOARD ADMIN</h1>
                <p>Lear Corporation</p>
            </div>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="container">
        <div class="quick-nav">
            <button class="nav-btn" onclick="exportToExcel()">Exporter Excel</button>
            <button class="nav-btn" onclick="chargerDonnees()">Actualiser</button>
            <button class="nav-btn" onclick="window.location.href='admin.html'">QR Code</button>
            <button class="nav-btn" onclick="window.location.href='liste.html'">Liste</button>
        </div>

        <div class="filters-box">
            <div style="margin-bottom:10px; font-weight:700;">FILTRES</div>
            <div class="filter-row">
                <div>
                    <label>Département</label>
                    <select id="filterDept" class="filter-input">
                        <option value="">Tous</option>
                    </select>
                </div>
                <div>
                    <label>Période</label>
                    <select id="filterPeriod" class="filter-input">
                        <option value="">Toutes</option>
                        <option value="today">Aujourd'hui</option>
                        <option value="week">Semaine</option>
                        <option value="month">Mois</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="appliquerFiltres()">Appliquer</button>
                <button class="btn-filter" onclick="reinitialiserFiltres()">Réinitialiser</button>
            </div>
        </div>

        <div class="section-title">VUE D'ENSEMBLE</div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-number" id="totalSug">0</div><div class="stat-label">Total</div></div>
            <div class="stat-box"><div class="stat-number" id="thisWeekSug">0</div><div class="stat-label">Semaine</div></div>
            <div class="stat-box"><div class="stat-number" id="activeUsers">0</div><div class="stat-label">Actifs</div></div>
            <div class="stat-box"><div class="stat-number" id="topDeptName">-</div><div class="stat-label">Top Dept</div></div>
        </div>

        <div class="section-title">GRAPHIQUES</div>
        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">Par Département</div>
                <div class="chart-container"><canvas id="deptChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Évolution</div>
                <div class="chart-container"><canvas id="timeChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Fréquence</div>
                <div class="chart-container"><canvas id="freqChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Zones</div>
                <div class="chart-container"><canvas id="zoneChart"></canvas></div>
            </div>
            <div class="chart-box chart-full">
                <div class="chart-title">KPIs</div>
                <div class="chart-container"><canvas id="kpiChart"></canvas></div>
            </div>
        </div>

        <div class="section-title">SUGGESTIONS</div>
        <table>
            <thead>
                <tr>
                    <th>Date</th><th>Matricule</th><th>Nom</th><th>Département</th>
                    <th>Titre</th><th>Zones</th><th>KPIs</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="api.js"></script>
    <script>
        let allSuggestions = [], suggestions = [], charts = {};
        const COLORS = ['#333','#666','#999','#111'];
        const ALL_ZONES = ['Logistique Entrée','Coupe','Préparation','Assemblage','Contrôle Qualité ECHOS Prise de Charge','Maintenance','Expédition / Livraison','Sécurité / RH','Support / Administration'];
        const ALL_KPIS = ['Augmenter Productivité','Réduire Coûts','Améliorer Qualité','Réduire Délais','Diminuer Rebuts','Réduire Arrêts','Améliorer Traçabilité','Optimiser Stocks','Réduire Accidents','Améliorer Satisfaction','Réduire Énergie','Optimiser Ressources','Réduire Scrap','Améliorer Ergonomie'];

        async function chargerDonnees() {
            const result = await obtenirSuggestions();
            if (result.success && Array.isArray(result.suggestions)) {
                allSuggestions = result.suggestions;
                suggestions = result.suggestions;
                remplirDepartements();
                updateStats();
                updateCharts();
                updateTable();
            }
        }

        function remplirDepartements() {
            const depts = [...new Set(allSuggestions.map(s => s.departement))].filter(d => d).sort();
            const select = document.getElementById('filterDept');
            depts.forEach(dept => {
                const opt = document.createElement('option');
                opt.value = dept;
                opt.textContent = dept;
                select.appendChild(opt);
            });
        }

        function appliquerFiltres() {
            const dept = document.getElementById('filterDept').value;
            const period = document.getElementById('filterPeriod').value;
            suggestions = allSuggestions.filter(s => {
                let ok = !dept || s.departement === dept;
                if (period && ok) {
                    const d = new Date(s.dateCreation);
                    const now = new Date();
                    if (period === 'today') ok = d.toDateString() === now.toDateString();
                    else if (period === 'week') { const w = new Date(); w.setDate(w.getDate()-7); ok = d > w; }
                    else if (period === 'month') { const m = new Date(); m.setMonth(m.getMonth()-1); ok = d > m; }
                }
                return ok;
            });
            updateStats();
            updateCharts();
            updateTable();
        }

        function reinitialiserFiltres() {
            document.getElementById('filterDept').value = '';
            document.getElementById('filterPeriod').value = '';
            suggestions = allSuggestions;
            updateStats();
            updateCharts();
            updateTable();
        }

        function updateStats() {
            document.getElementById('totalSug').textContent = suggestions.length;
            const week = new Date(); week.setDate(week.getDate()-7);
            document.getElementById('thisWeekSug').textContent = suggestions.filter(s => new Date(s.dateCreation) > week).length;
            document.getElementById('activeUsers').textContent = new Set(suggestions.map(s => s.matricule)).size;
            const depts = {}; suggestions.forEach(s => { const k = s.departement || 'N/A'; depts[k] = (depts[k]||0)+1; });
            const top = Object.entries(depts).sort((a,b) => b[1]-a[1])[0];
            if (top) document.getElementById('topDeptName').textContent = top[0];
        }

        function updateCharts() {
            makeChart('deptChart', 'bar', 'Département');
            makeChart('timeChart', 'line', 'Temps');
            makeChart('freqChart', 'bar', 'Fréquence');
            makeChart('zoneChart', 'bar', 'Zones');
            makeChart('kpiChart', 'bar', 'KPIs');
        }

        function makeChart(id, type, label) {
            const ctx = document.getElementById(id).getContext('2d');
            if (charts[id]) charts[id].destroy();
            let data = [], labels = [];
            if (label === 'Département') {
                const d = {}; suggestions.forEach(s => { const k = s.departement || 'N/A'; d[k] = (d[k]||0)+1; });
                labels = Object.keys(d); data = Object.values(d);
            } else if (label === 'Zones') {
                const z = {}; ALL_ZONES.forEach(x => z[x] = 0); suggestions.forEach(s => (s.zonesImpact||[]).forEach(x => z[x]++));
                const sorted = Object.entries(z).sort((a,b) => b[1]-a[1]); labels = sorted.map(e => e[0]); data = sorted.map(e => e[1]);
            } else if (label === 'KPIs') {
                const k = {}; ALL_KPIS.forEach(x => k[x] = 0); suggestions.forEach(s => (s.kpisImpactes||[]).forEach(x => k[x]++));
                const sorted = Object.entries(k).sort((a,b) => b[1]-a[1]); labels = sorted.map(e => e[0]); data = sorted.map(e => e[1]);
            } else {
                labels = ['Données']; data = [suggestions.length];
            }
            charts[id] = new Chart(ctx, { type: type, data: { labels: labels, datasets: [{label: label, data: data, backgroundColor: COLORS}] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: label==='Zones' || label==='KPIs' ? 'y' : 'x', plugins: { legend: { display: false } } } });
        }

        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            suggestions.slice(0,20).forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${new Date(s.dateCreation).toLocaleDateString('fr-FR')}</td><td>${s.matricule}</td><td>${s.nom}</td><td>${s.departement||'-'}</td><td>${s.titreIdee||'-'}</td><td>${(s.zonesImpact||[]).join(', ')}</td><td>${(s.kpisImpactes||[]).join(', ')}</td>`;
                tbody.appendChild(tr);
            });
        }

        function exportToExcel() {
            if (!suggestions.length) return;
            const data = suggestions.map((s,i) => ({ 'N°':i+1, 'Date':new Date(s.dateCreation).toLocaleDateString('fr-FR'), 'Matricule':s.matricule, 'Nom':s.nom, 'Département':s.departement||'', 'Zones':(s.zonesImpact||[]).join(', '), 'KPIs':(s.kpisImpactes||[]).join(', ') }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Suggestions');
            XLSX.writeFile(wb, 'Suggestions.xlsx');
        }

        function logout() {
            if (confirm('Déconnexion ?')) { sessionStorage.removeItem('adminAuthenticated'); window.location.href = 'login-admin.html'; }
        }

        window.onload = chargerDonnees;
    </script>
</body>
</html>
