<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Lear Corporation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8faff 0%, #f0f4fa 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #E31837, #B3122B);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(227, 24, 55, 0.3);
        }

        .header h1 {
            font-size: 28px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: white;
            color: #E31837;
        }

        .container {
            max-width: 1600px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }

        .stat-icon.blue { background: linear-gradient(135deg, #3498db, #2980b9); }
        .stat-icon.red { background: linear-gradient(135deg, #E31837, #B3122B); }
        .stat-icon.green { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .stat-icon.orange { background: linear-gradient(135deg, #f39c12, #e67e22); }

        .stat-info h3 {
            font-size: 32px;
            color: #333;
            font-weight: bold;
        }

        .stat-info p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .actions-bar {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-export {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .btn-export:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #0033A0, #00227A);
            color: white;
        }

        .btn-refresh:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 51, 160, 0.3);
        }

        .btn-qrcode {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .btn-qrcode:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.3);
        }

        .btn-liste {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-liste:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .chart-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .chart-container {
            height: 300px;
        }

        .table-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .table-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #E31837;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e5e7e9;
            font-size: 14px;
        }

        tr:hover {
            background: #f8faff;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-production { background: #3498db; color: white; }
        .badge-securite { background: #e74c3c; color: white; }
        .badge-qualite { background: #2ecc71; color: white; }
        .badge-maintenance { background: #f39c12; color: white; }
        .badge-logistique { background: #9b59b6; color: white; }
        .badge-achats { background: #1abc9c; color: white; }
        .badge-rh { background: #34495e; color: white; }
        .badge-ingenierie { background: #16a085; color: white; }
        .badge-it { background: #2c3e50; color: white; }
        .badge-finance { background: #27ae60; color: white; }
        .badge-environnement { background: #2ecc71; color: white; }
        .badge-planning { background: #e67e22; color: white; }
        .badge-recherche { background: #8e44ad; color: white; }
        .badge-commercial { background: #c0392b; color: white; }
        .badge-organisation { background: #7f8c8d; color: white; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            .actions-bar {
                flex-direction: column;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <script>
        if (sessionStorage.getItem('adminAuthenticated') !== 'true') {
            window.location.href = 'login-admin.html';
        }
    </script>

    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Dashboard Admin</h1>
        <div class="header-right">
            <div class="user-info">
                <i class="fas fa-user-shield"></i>
                <span id="adminName">Admin</span>
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalSuggestions">0</h3>
                    <p>Suggestions Totales</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon red">
                    <i class="fas fa-fire"></i>
                </div>
                <div class="stat-info">
                    <h3 id="thisWeek">0</h3>
                    <p>Cette Semaine</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3 id="uniqueUsers">0</h3>
                    <p>Employés Participants</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-trophy"></i>
                </div>
                <div class="stat-info">
                    <h3 id="topCategory">-</h3>
                    <p>Catégorie Top</p>
                </div>
            </div>
        </div>

        <div class="actions-bar">
            <button class="btn-action btn-export" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i> Exporter Excel
            </button>
            <button class="btn-action btn-refresh" onclick="chargerDonnees()">
                <i class="fas fa-sync"></i> Actualiser
            </button>
            <button class="btn-action btn-qrcode" onclick="window.location.href='admin.html'">
                <i class="fas fa-qrcode"></i> Générer QR Code
            </button>
            <button class="btn-action btn-liste" onclick="window.location.href='liste.html'">
                <i class="fas fa-list"></i> Liste Complète
            </button>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3><i class="fas fa-chart-pie"></i> Suggestions par Catégorie</h3>
                <canvas id="categoryChart"></canvas>
            </div>

            <div class="chart-card">
                <h3><i class="fas fa-chart-bar"></i> Évolution Mensuelle</h3>
                <canvas id="timeChart"></canvas>
            </div>

            <div class="chart-card">
                <h3><i class="fas fa-clock"></i> Fréquence des Problèmes</h3>
                <canvas id="frequencyChart"></canvas>
            </div>

            <div class="chart-card">
                <h3><i class="fas fa-chart-line"></i> Impact Estimé</h3>
                <canvas id="impactChart"></canvas>
            </div>
        </div>

        <div class="table-card">
            <h3><i class="fas fa-list"></i> Dernières Suggestions</h3>
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Chargement des données...
            </div>
            <div id="tableContainer" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Employé</th>
                            <th>Problème</th>
                            <th>Catégorie</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="api.js"></script>
    
    <script>
        document.getElementById('adminName').textContent = sessionStorage.getItem('adminUsername') || 'Admin';

        let suggestions = [];
        let charts = {};

        async function chargerDonnees() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableContainer').style.display = 'none';

            const result = await obtenirSuggestions();

            if (result.success) {
                suggestions = result.suggestions;
                updateStats();
                updateCharts();
                updateTable();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'block';
            }
        }

        function updateStats() {
            document.getElementById('totalSuggestions').textContent = suggestions.length;

            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
            const thisWeek = suggestions.filter(s => new Date(s.dateCreation) > oneWeekAgo).length;
            document.getElementById('thisWeek').textContent = thisWeek;

            const uniqueUsers = new Set(suggestions.map(s => s.matricule)).size;
            document.getElementById('uniqueUsers').textContent = uniqueUsers;

            const categories = suggestions.reduce((acc, s) => {
                acc[s.categorie] = (acc[s.categorie] || 0) + 1;
                return acc;
            }, {});
            const topCategory = Object.keys(categories).sort((a, b) => categories[b] - categories[a])[0];
            document.getElementById('topCategory').textContent = topCategory || '-';
        }

        function updateCharts() {
            createCategoryChart();
            createTimeChart();
            createFrequencyChart();
            createImpactChart();
        }

        function createCategoryChart() {
            const ctx = document.getElementById('categoryChart');
            
            if (charts.category) charts.category.destroy();

            const categories = suggestions.reduce((acc, s) => {
                acc[s.categorie] = (acc[s.categorie] || 0) + 1;
                return acc;
            }, {});

            charts.category = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: [
                            '#3498db', '#e74c3c', '#2ecc71', '#f39c12',
                            '#9b59b6', '#1abc9c', '#34495e', '#16a085'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function createTimeChart() {
            const ctx = document.getElementById('timeChart');
            
            if (charts.time) charts.time.destroy();

            const months = {};
            suggestions.forEach(s => {
                const month = new Date(s.dateCreation).toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' });
                months[month] = (months[month] || 0) + 1;
            });

            charts.time = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(months),
                    datasets: [{
                        label: 'Suggestions',
                        data: Object.values(months),
                        borderColor: '#E31837',
                        backgroundColor: 'rgba(227, 24, 55, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function createFrequencyChart() {
            const ctx = document.getElementById('frequencyChart');
            
            if (charts.frequency) charts.frequency.destroy();

            const frequencies = suggestions.reduce((acc, s) => {
                acc[s.frequence] = (acc[s.frequence] || 0) + 1;
                return acc;
            }, {});

            charts.frequency = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(frequencies),
                    datasets: [{
                        label: 'Nombre',
                        data: Object.values(frequencies),
                        backgroundColor: '#0033A0'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function createImpactChart() {
            const ctx = document.getElementById('impactChart');
            
            if (charts.impact) charts.impact.destroy();

            const impacts = suggestions.reduce((acc, s) => {
                acc[s.impact] = (acc[s.impact] || 0) + 1;
                return acc;
            }, {});

            charts.impact = new Chart(ctx, {
                type: 'polarArea',
                data: {
                    labels: Object.keys(impacts),
                    datasets: [{
                        data: Object.values(impacts),
                        backgroundColor: [
                            'rgba(227, 24, 55, 0.7)',
                            'rgba(0, 51, 160, 0.7)',
                            'rgba(46, 204, 113, 0.7)',
                            'rgba(243, 156, 18, 0.7)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const recent = suggestions.slice(0, 10);

            recent.forEach(s => {
                const date = new Date(s.dateCreation).toLocaleDateString('fr-FR');
                const row = `
                    <tr>
                        <td>${date}</td>
                        <td><strong>${s.nom}</strong><br><small>${s.matricule}</small></td>
                        <td>${s.probleme.substring(0, 60)}...</td>
                        <td><span class="badge badge-${s.categorie}">${s.categorie}</span></td>
                        <td>
                            <button onclick="window.location.href='liste.html'" style="padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer;">
                                <i class="fas fa-eye"></i> Voir
                            </button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function exportToExcel() {
            if (suggestions.length === 0) {
                alert('Aucune donnée à exporter');
                return;
            }

            const data = suggestions.map(s => ({
                'Date': new Date(s.dateCreation).toLocaleDateString('fr-FR'),
                'Matricule': s.matricule,
                'Nom': s.nom,
                'Problème': s.probleme,
                'Fréquence': s.frequence,
                'Catégorie': s.categorie,
                'Conséquences': s.consequences || '',
                'Idée': s.idee,
                'Gain': s.gain || '',
                'Impact': s.impact
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Suggestions');

            const fileName = `suggestions-lear-${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);

            console.log('✅ Export Excel réussi:', fileName);
        }

        function logout() {
            sessionStorage.removeItem('adminAuthenticated');
            sessionStorage.removeItem('adminUsername');
            window.location.href = 'login-admin.html';
        }

        window.onload = chargerDonnees;
    </script>
</body>
</html>
