<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lear Corporation - Excellence & Innovation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        html[lang="ar"] {
            direction: rtl;
            text-align: right;
        }

        html[lang="ar"] * {
            direction: rtl;
            text-align: right;
        }

        body {
            background: linear-gradient(145deg, #f8faff 0%, #f0f4fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Couleurs Lear Corporation */
        :root {
            --lear-red: #E31837;
            --lear-red-dark: #B3122B;
            --lear-red-light: #FF4D6D;
            --lear-blue: #0033A0;
            --lear-blue-dark: #00227A;
            --lear-blue-light: #1E4FD9;
            --lear-grey: #6C6F70;
            --lear-grey-light: #E5E7E9;
            --lear-grey-dark: #4A4D4F;
            --white: #FFFFFF;
            --black: #1A1E24;
            --gradient-1: linear-gradient(135deg, var(--lear-red), var(--lear-red-dark));
            --gradient-2: linear-gradient(135deg, var(--lear-blue), var(--lear-blue-dark));
            --gradient-3: linear-gradient(135deg, #f5f7fa, #e9ecf0);
            --shadow-sm: 0 10px 30px rgba(0, 51, 160, 0.08);
            --shadow-md: 0 20px 40px rgba(227, 24, 55, 0.12);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        /* Logo Lear */
        .lear-logo {
            width: 220px;
            height: auto;
            margin-bottom: 20px;
        }
        
        .lear-logo-header {
            width: 140px;
            height: auto;
        }

        /* Sélecteur de langue */
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 15px;
            border-radius: 50px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(227, 24, 55, 0.1);
        }

        html[lang="ar"] .language-selector {
            left: 20px;
            right: auto;
        }

        .lang-btn {
            padding: 8px 18px;
            border: 2px solid var(--lear-grey-light);
            background: white;
            color: var(--lear-grey-dark);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .lang-btn:hover {
            border-color: var(--lear-red);
            color: var(--lear-red);
        }

        .lang-btn.active {
            background: var(--gradient-1);
            color: white;
            border-color: var(--lear-red);
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.3);
        }

        /* Page de connexion */
        .login-wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: radial-gradient(circle at 30% 50%, rgba(227, 24, 55, 0.08) 0%, transparent 50%);
            z-index: -1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px 50px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--lear-red), var(--lear-blue), var(--lear-red));
            background-size: 200% 100%;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lear-branding {
            text-align: center;
            margin-bottom: 40px;
        }

        .meknes-badge {
            background: var(--gradient-3);
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: var(--lear-blue);
            border: 1px solid rgba(0, 51, 160, 0.1);
            margin-top: 20px;
            box-shadow: var(--shadow-sm);
        }

        .input-group-modern {
            margin-bottom: 25px;
        }

        .input-group-modern label {
            display: block;
            margin-bottom: 10px;
            color: var(--lear-grey-dark);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field-modern {
            position: relative;
        }

        .input-field-modern i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--lear-blue);
            opacity: 0.5;
            transition: all 0.3s;
        }

        html[lang="ar"] .input-field-modern i {
            left: auto;
            right: 20px;
        }

        .input-field-modern input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            border: 2px solid var(--lear-grey-light);
            border-radius: 20px;
            font-size: 15px;
            background: var(--white);
            transition: all 0.3s;
            color: var(--black);
            font-weight: 500;
        }

        html[lang="ar"] .input-field-modern input {
            padding: 18px 55px 18px 20px;
        }

        .input-field-modern input:focus {
            outline: none;
            border-color: var(--lear-red);
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.15);
        }

        .input-field-modern input:focus + i {
            opacity: 1;
            color: var(--lear-red);
        }

        .btn-login-modern {
            width: 100%;
            padding: 18px;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(227, 24, 55, 0.3);
        }

        .btn-login-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login-modern:hover::before {
            left: 100%;
        }

        .btn-login-modern:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(227, 24, 55, 0.4);
        }

        .login-footer-modern {
            margin-top: 30px;
            text-align: center;
            color: var(--lear-grey);
            font-size: 13px;
            padding-top: 20px;
            border-top: 1px solid var(--lear-grey-light);
        }

        /* Page principale */
        .main-wrapper {
            display: none;
            width: 100%;
            max-width: 1400px;
            background: #FFFFFF;
            min-height: 100vh;
            border-radius: 50px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(227, 24, 55, 0.1);
        }

        .main-wrapper.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Header premium */
        .header-premium {
            background: var(--white);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(227, 24, 55, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header-premium::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--lear-red), var(--lear-blue));
        }

        .brand-premium {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .brand-text-premium h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--lear-blue), var(--lear-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text-premium p {
            color: var(--lear-grey);
            font-size: 13px;
            font-weight: 500;
        }

        .user-premium {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(145deg, #f8faff, #ffffff);
            padding: 10px 25px 10px 15px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
        }

        .user-avatar-premium {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, var(--lear-blue), var(--lear-red));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 22px;
            box-shadow: 0 10px 20px rgba(227, 24, 55, 0.3);
        }

        .user-info-premium h4 {
            color: var(--lear-blue);
            font-weight: 700;
            font-size: 16px;
        }

        .user-info-premium p {
            color: var(--lear-grey);
            font-size: 12px;
            font-weight: 500;
        }

        .btn-logout {
            background: var(--gradient-1);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(227, 24, 55, 0.4);
        }

        /* Dashboard Grid Premium */
        .dashboard-grid-premium {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* Card Premium */
        .card-premium {
            background: var(--white);
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(227, 24, 55, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card-premium:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .card-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--lear-red), var(--lear-blue));
        }

        .card-header-premium {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card-icon-premium {
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, var(--lear-blue), var(--lear-red));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 10px 20px rgba(0, 51, 160, 0.2);
        }

        .card-title-premium h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--lear-blue);
        }

        .card-title-premium p {
            color: var(--lear-red);
            font-weight: 500;
            font-size: 14px;
        }

        /* Formulaire Premium */
        .form-premium {
            display: grid;
            gap: 20px;
        }

        .form-group-premium {
            position: relative;
        }

        .form-group-premium label {
            display: block;
            margin-bottom: 8px;
            color: var(--lear-grey-dark);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group-premium input,
        .form-group-premium select,
        .form-group-premium textarea {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--lear-grey-light);
            border-radius: 18px;
            font-size: 14px;
            background: linear-gradient(145deg, #fafcff, var(--white));
            transition: all 0.3s;
        }

        .form-group-premium input:focus,
        .form-group-premium select:focus,
        .form-group-premium textarea:focus {
            outline: none;
            border-color: var(--lear-red);
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.1);
        }

        .btn-submit-premium {
            background: linear-gradient(145deg, var(--lear-blue), var(--lear-red));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-submit-premium::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-submit-premium:hover::before {
            width: 300px;
            height: 300px;
        }

        /* Alert Premium */
        .alert-premium {
            padding: 20px;
            border-radius: 18px;
            margin-top: 20px;
            display: none;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .alert-premium.success {
            display: block;
            background: linear-gradient(145deg, var(--lear-blue), #1E4FD9);
            color: white;
        }

        .alert-premium.error {
            display: block;
            background: linear-gradient(145deg, var(--lear-red), #FF4D6D);
            color: white;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .dashboard-grid-premium {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header-premium {
                flex-direction: column;
                gap: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }

            .user-premium {
                flex-direction: column;
                width: 100%;
            }

            .user-card {
                width: 100%;
            }

            .btn-logout {
                width: 100%;
                justify-content: center;
            }

            .language-selector {
                top: auto;
                bottom: 20px;
                right: 20px;
            }

            html[lang="ar"] .language-selector {
                left: auto;
                right: 20px;
            }
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Sélecteur de langue -->
    <div class="language-selector">
        <button class="lang-btn active" onclick="changeLanguage('fr')" data-lang="fr">FR</button>
        <button class="lang-btn" onclick="changeLanguage('en')" data-lang="en">EN</button>
        <button class="lang-btn" onclick="changeLanguage('ar')" data-lang="ar">AR</button>
    </div>

    <!-- Page de connexion -->
    <div id="loginPage" class="login-wrapper">
        <div class="login-card floating">
            <div class="lear-branding">
                <svg class="lear-logo" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Cercle rouge -->
                    <circle cx="100" cy="100" r="90" fill="#C8402E"/>
                    <!-- L blanc incliné -->
                    <g transform="rotate(-15 100 100)">
                        <path d="M 70 45 L 95 45 L 95 145 L 140 145 L 140 165 L 70 165 Z" fill="white"/>
                    </g>
                    <!-- Texte LEAR -->
                    <text x="220" y="120" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#2B2B2B">LEAR</text>
                    <text x="220" y="160" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#2B2B2B" letter-spacing="12">CORPORATION</text>
                </svg>

                <div class="meknes-badge">
                    <i class="fas fa-map-pin" style="color: var(--lear-red);"></i>
                    <span data-i18n="industrial_park">PARC INDUSTRIEL DE MEKNÈS</span>
                    <i class="fas fa-certificate" style="color: var(--lear-blue);"></i>
                </div>
            </div>

            <div class="input-group-modern">
                <label><i class="fas fa-id-card" style="margin-right: 8px;"></i> <span data-i18n="matricule">MATRICULE</span></label>
                <div class="input-field-modern">
                    <i class="fas fa-user"></i>
                    <input type="text" id="matricule" placeholder="Ex: LE2024">
                </div>
            </div>

            <div class="input-group-modern">
                <label><i class="fas fa-user-tag" style="margin-right: 8px;"></i> <span data-i18n="full_name">NOM COMPLET</span></label>
                <div class="input-field-modern">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="nom" placeholder="Votre nom">
                </div>
            </div>

            <button class="btn-login-modern" onclick="login()">
                <i class="fas fa-arrow-right-to-bracket" style="margin-right: 10px;"></i>
                <span data-i18n="access_space">ACCÉDER À L'ESPACE</span>
            </button>

            <div class="login-footer-modern">
                <i class="fas fa-copyright"></i> 2024 Lear Corporation - <span data-i18n="excellence">Excellence en Mouvement</span>
            </div>
        </div>
    </div>

    <!-- Page principale -->
    <div id="mainPage" class="main-wrapper">
        <!-- Header Premium -->
        <div class="header-premium">
            <div class="brand-premium">
                <svg class="lear-logo-header" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Cercle rouge -->
                    <circle cx="100" cy="100" r="90" fill="#C8402E"/>
                    <!-- L blanc incliné -->
                    <g transform="rotate(-15 100 100)">
                        <path d="M 70 45 L 95 45 L 95 145 L 140 145 L 140 165 L 70 165 Z" fill="white"/>
                    </g>
                    <!-- Texte LEAR -->
                    <text x="220" y="120" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#2B2B2B">LEAR</text>
                    <text x="220" y="160" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#2B2B2B" letter-spacing="12">CORPORATION</text>
                </svg>
                <div class="brand-text-premium">
                    <h2>LEAR Corporation</h2>
                    <p><i class="fas fa-industry" style="color: var(--lear-red);"></i> <span data-i18n="continuous_improvement">Parc Industriel de Meknès - Amélioration Continue</span></p>
                </div>
            </div>

            <div class="user-premium">
                <div class="user-card">
                    <div class="user-avatar-premium" id="avatarInitials">AB</div>
                    <div class="user-info-premium">
                        <h4 id="displayNameHeader">Ahmed Bennis</h4>
                        <p><i class="fas fa-id-badge"></i> <span id="displayMatriculeHeader">LE240315</span></p>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span data-i18n="logout">DÉCONNEXION</span>
                </button>
            </div>
        </div>

        <!-- Dashboard Premium -->
        <div class="dashboard-grid-premium">
            <!-- Formulaire -->
            <div class="card-premium">
                <div class="card-header-premium">
                    <div class="card-icon-premium">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <div class="card-title-premium">
                        <h3 data-i18n="submit_idea">Soumettre une idée</h3>
                        <p><i class="fas fa-chevron-right"></i> <span data-i18n="your_contribution">Votre contribution compte</span></p>
                    </div>
                </div>

                <div class="form-premium">
                    <div class="form-group-premium">
                        <label><i class="fas fa-exclamation-triangle" style="color: var(--lear-red);"></i> <span data-i18n="problem_encountered">PROBLÈME RENCONTRÉ</span> *</label>
                        <input type="text" id="probleme" placeholder="Ex: Temps d'arrêt machine trop long">
                    </div>

                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group-premium">
                            <label><i class="fas fa-clock" style="color: var(--lear-blue);"></i> <span data-i18n="frequency">FRÉQUENCE</span></label>
                            <select id="frequence">
                                <option value="quotidien" data-i18n="daily">Quotidienne</option>
                                <option value="hebdomadaire" data-i18n="weekly">Hebdomadaire</option>
                                <option value="mensuel" data-i18n="monthly">Mensuelle</option>
                                <option value="occasionnel" data-i18n="occasional">Occasionnelle</option>
                            </select>
                        </div>

                        <div class="form-group-premium">
                            <label><i class="fas fa-tag" style="color: var(--lear-red);"></i> <span data-i18n="category">CATÉGORIE</span></label>
                            <select id="categorie">
                                <option value="production" data-i18n="production">Production</option>
                                <option value="securite" data-i18n="safety">Sécurité</option>
                                <option value="qualite" data-i18n="quality">Qualité</option>
                                <option value="maintenance" data-i18n="maintenance">Maintenance</option>
                                <option value="logistique" data-i18n="logistics">Logistique</option>

        let currentLanguage = 'fr';
        let utilisateur = {
            nom: '',
            matricule: ''
        };

        function changeLanguage(lang) {
            currentLanguage = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[onclick="changeLanguage('${lang}')"]`).classList.add('active');

            updateTranslations();
        }

        function updateTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[currentLanguage][key]) {
                    element.textContent = translations[currentLanguage][key];
                }
            });
        }

        function login() {
            const matricule = document.getElementById('matricule').value;
            const nom = document.getElementById('nom').value;

            if (matricule && nom) {
                utilisateur.nom = nom;
                utilisateur.matricule = matricule;

                const initials = nom.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('avatarInitials').textContent = initials;
                document.getElementById('displayNameHeader').textContent = nom;
                document.getElementById('displayMatriculeHeader').textContent = matricule;

                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').classList.add('active');
            } else {
                showMessage(translations[currentLanguage].fill_all_fields, 'error');
            }
        }

        function logout() {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('loginPage').style.display = 'block';

            document.getElementById('probleme').value = '';
            document.getElementById('consequences').value = '';
            document.getElementById('idee').value = '';
            document.getElementById('gain').value = '';
        }

        async function validerSuggestion() {
            const probleme = document.getElementById('probleme').value;
            const idee = document.getElementById('idee').value;

            if (!probleme || !idee) {
                showMessage(translations[currentLanguage].fill_required_fields, 'error');
                return;
            }

            // Préparer les données pour l'envoi
            const data = {
                matricule: utilisateur.matricule,
                nom: utilisateur.nom,
                probleme: probleme,
                frequence: document.getElementById('frequence').value,
                categorie: document.getElementById('categorie').value,
                consequences: document.getElementById('consequences').value,
                idee: idee,
                gain: document.getElementById('gain').value,
                impact: document.getElementById('impact').value
            };

            console.log('📤 Envoi de la suggestion:', data);

            // Envoyer au serveur
            try {
                const result = await creerSuggestion(data);
                
                if (result.success) {
                    showMessage(translations[currentLanguage].suggestion_registered, 'success');
                    console.log('✅ Suggestion enregistrée avec succès');
                    
                    // Vider les champs après succès
                    document.getElementById('probleme').value = '';
                    document.getElementById('consequences').value = '';
                    document.getElementById('idee').value = '';
                    document.getElementById('gain').value = '';
                } else {
                    showMessage('❌ Erreur: ' + (result.message || 'Erreur inconnue'), 'error');
                    console.error('❌ Erreur:', result);
                }
            } catch (error) {
                showMessage('❌ Erreur de connexion au serveur', 'error');
                console.error('❌ Erreur catch:', error);
            }
        }

        function showMessage(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = 'alert-premium ' + type;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        window.onload = function() {
            changeLanguage('fr');
        };
