<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Suggestions - Lear Corporation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8faff 0%, #f0f4fa 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #E31837;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .stat-card {
            background: linear-gradient(135deg, #E31837, #B3122B);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #E31837;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e5e7e9;
        }

        tr:hover {
            background: #f8faff;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-production { background: #3498db; color: white; }
        .badge-securite { background: #e74c3c; color: white; }
        .badge-qualite { background: #2ecc71; color: white; }
        .badge-maintenance { background: #f39c12; color: white; }
        .badge-logistique { background: #9b59b6; color: white; }
        .badge-achats { background: #1abc9c; color: white; }
        .badge-rh { background: #34495e; color: white; }
        .badge-ingenierie { background: #16a085; color: white; }
        .badge-it { background: #2c3e50; color: white; }
        .badge-finance { background: #27ae60; color: white; }
        .badge-environnement { background: #2ecc71; color: white; }
        .badge-planning { background: #e67e22; color: white; }
        .badge-recherche { background: #8e44ad; color: white; }
        .badge-commercial { background: #c0392b; color: white; }
        .badge-organisation { background: #7f8c8d; color: white; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #0033A0, #00227A);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 51, 160, 0.3);
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .date {
            color: #666;
            font-size: 13px;
        }

        /* Modal pour voir les détails */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #E31837;
        }

        .modal-header h2 {
            color: #E31837;
            font-size: 24px;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: #E31837;
        }

        .detail-group {
            margin-bottom: 20px;
        }

        .detail-label {
            font-weight: bold;
            color: #0033A0;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 15px;
            padding: 10px;
            background: #f8faff;
            border-radius: 8px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        /* Message de confirmation */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            animation: slideInRight 0.3s;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.error {
            background: #e74c3c;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-list"></i> Liste des Suggestions</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total">0</div>
                <div class="stat-label">Suggestions Totales</div>
            </div>
        </div>

        <button class="btn-refresh" onclick="chargerSuggestions()">
            <i class="fas fa-sync"></i> Actualiser
        </button>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Chargement des suggestions...
        </div>

        <div class="table-container">
            <table id="table" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Matricule</th>
                        <th>Nom</th>
                        <th>Problème</th>
                        <th>Idée</th>
                        <th>Catégorie</th>
                        <th>Fréquence</th>
                        <th>Gain</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal pour afficher les détails -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-info-circle"></i> Détails de la suggestion</h2>
                <span class="close" onclick="fermerModal()">&times;</span>
            </div>
            <div id="modal-body">
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let suggestions = [];

        async function chargerSuggestions() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('table').style.display = 'none';

            const result = await obtenirSuggestions();

            if (result.success) {
                suggestions = result.suggestions;
                document.getElementById('total').textContent = suggestions.length;

                const tbody = document.getElementById('tbody');
                tbody.innerHTML = '';

                suggestions.forEach(s => {
                    const date = new Date(s.dateCreation).toLocaleDateString('fr-FR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    const row = `
                        <tr id="row-${s._id}">
                            <td class="date">${date}</td>
                            <td><strong>${s.matricule}</strong></td>
                            <td>${s.nom}</td>
                            <td>${s.probleme.substring(0, 50)}${s.probleme.length > 50 ? '...' : ''}</td>
                            <td>${s.idee.substring(0, 50)}${s.idee.length > 50 ? '...' : ''}</td>
                            <td><span class="badge badge-${s.categorie}">${s.categorie}</span></td>
                            <td>${s.frequence}</td>
                            <td>${s.gain || 'N/A'}</td>
                            <td class="actions">
                                <button class="btn-view" onclick="afficherDetails('${s._id}')">
                                    <i class="fas fa-eye"></i> Voir
                                </button>
                                <button class="btn-delete" onclick="confirmerSuppression('${s._id}', '${s.nom}')">
                                    <i class="fas fa-trash"></i> Supprimer
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('table').style.display = 'table';

                console.log('✅', suggestions.length, 'suggestions chargées');
            } else {
                document.getElementById('loading').innerHTML = 
                    '<i class="fas fa-exclamation-triangle"></i> Erreur : ' + result.message;
            }
        }

        function afficherDetails(id) {
            const suggestion = suggestions.find(s => s._id === id);
            if (!suggestion) return;

            const date = new Date(suggestion.dateCreation).toLocaleDateString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-calendar"></i> Date de création</div>
                    <div class="detail-value">${date}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-id-card"></i> Matricule</div>
                    <div class="detail-value">${suggestion.matricule}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-user"></i> Nom</div>
                    <div class="detail-value">${suggestion.nom}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-exclamation-triangle"></i> Problème rencontré</div>
                    <div class="detail-value">${suggestion.probleme}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-clock"></i> Fréquence</div>
                    <div class="detail-value">${suggestion.frequence}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-tag"></i> Catégorie</div>
                    <div class="detail-value"><span class="badge badge-${suggestion.categorie}">${suggestion.categorie}</span></div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-chart-line"></i> Conséquences</div>
                    <div class="detail-value">${suggestion.consequences || 'N/A'}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-lightbulb"></i> Idée de solution</div>
                    <div class="detail-value">${suggestion.idee}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-gauge-high"></i> Gain estimé</div>
                    <div class="detail-value">${suggestion.gain || 'N/A'}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label"><i class="fas fa-chart-simple"></i> Impact</div>
                    <div class="detail-value">${suggestion.impact}</div>
                </div>
            `;

            document.getElementById('modal').style.display = 'block';
        }

        function fermerModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Fermer la modal en cliquant en dehors
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                fermerModal();
            }
        }

        function confirmerSuppression(id, nom) {
            if (confirm(`⚠️ Êtes-vous sûr de vouloir supprimer la suggestion de "${nom}" ?\n\nCette action est irréversible !`)) {
                supprimerSuggestion(id);
            }
        }

        async function supprimerSuggestion(id) {
            try {
                // ⚠️ CHANGEMENT ICI : URL de production au lieu de localhost
                const API_URL = 'https://lear-backend.onrender.com/api';
                
                const response = await fetch(`${API_URL}/suggestion/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    // Supprimer visuellement la ligne
                    const row = document.getElementById(`row-${id}`);
                    if (row) {
                        row.style.transition = 'all 0.3s';
                        row.style.opacity = '0';
                        row.style.transform = 'translateX(-100px)';
                        
                        setTimeout(() => {
                            row.remove();
                            
                            // Mettre à jour le compteur
                            const currentTotal = parseInt(document.getElementById('total').textContent);
                            document.getElementById('total').textContent = currentTotal - 1;
                            
                            // Recharger si plus de suggestions
                            if (currentTotal - 1 === 0) {
                                chargerSuggestions();
                            }
                        }, 300);
                    }

                    afficherToast('✅ Suggestion supprimée avec succès !', 'success');
                    console.log('✅ Suggestion supprimée:', id);
                } else {
                    afficherToast('❌ Erreur: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Erreur:', error);
                afficherToast('❌ Erreur de connexion au serveur', 'error');
            }
        }

        function afficherToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Charger au démarrage
        window.onload = chargerSuggestions;
    </script>
</body>
</html>
