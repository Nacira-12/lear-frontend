<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Suggestions - Lear Corporation</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }

        body {
            background: linear-gradient(145deg, #f8faff 0%, #f0f4fa 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        h1 {
            color: #C8102E;
            text-align: center;
            margin-bottom: 30px;
            font-size: 30px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #C8102E, #96001E);
            color: white;
            padding: 18px 35px;
            border-radius: 12px;
            text-align: center;
            min-width: 160px;
        }

        .stat-card.blue { background: linear-gradient(135deg, #002F6C, #1A4A8A); }

        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label  { font-size: 13px; opacity: 0.9; margin-top: 4px; }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #002F6C, #001E50);
            color: white; border: none; padding: 12px 25px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-refresh:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,47,108,0.3); }

        .btn-back {
            background: linear-gradient(135deg, #666, #444);
            color: white; border: none; padding: 12px 25px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
            text-decoration: none;
        }
        .btn-back:hover { transform: translateY(-2px); }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 350px;
        }
        .search-box input {
            width: 100%; padding: 12px 40px 12px 15px;
            border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px;
        }
        .search-box input:focus { outline: none; border-color: #C8102E; }
        .search-box i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #999; }

        .loading { text-align: center; padding: 40px; color: #666; font-size: 18px; }

        .table-container { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }

        th {
            background: linear-gradient(135deg, #C8102E, #96001E);
            color: white; padding: 13px 12px; text-align: left;
            font-weight: 600; text-transform: uppercase; font-size: 11px;
            letter-spacing: 0.5px; position: sticky; top: 0; z-index: 10;
        }

        td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        tr:hover { background: #fef8f8; }

        .badge {
            display: inline-block; padding: 4px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; white-space: nowrap;
        }
        .badge-dept { background: #fff3e0; color: #e65100; }
        .badge-freq { background: #e8f5e9; color: #2e7d32; }

        .tag {
            display: inline-block; padding: 3px 8px; border-radius: 10px;
            font-size: 10px; font-weight: 600; margin: 2px;
            background: #f0f4fa; color: #002F6C;
        }
        .tag-kpi { background: #fde8ec; color: #C8102E; }

        .btn-view {
            background: #3498db; color: white; border: none;
            padding: 7px 14px; border-radius: 7px; cursor: pointer;
            font-size: 12px; font-weight: bold; margin-right: 5px; transition: all 0.3s;
        }
        .btn-view:hover { background: #2980b9; transform: translateY(-1px); }

        .btn-delete {
            background: #e74c3c; color: white; border: none;
            padding: 7px 14px; border-radius: 7px; cursor: pointer;
            font-size: 12px; font-weight: bold; transition: all 0.3s;
        }
        .btn-delete:hover { background: #c0392b; transform: translateY(-1px); }

        /* Modal */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        .modal-content {
            background: white; margin: 30px auto; padding: 40px;
            border-radius: 20px; width: 90%; max-width: 860px;
            max-height: 85vh; overflow-y: auto; animation: slideIn 0.3s;
        }
        @keyframes slideIn { from{transform:translateY(-40px);opacity:0} to{transform:translateY(0);opacity:1} }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; padding-bottom: 18px;
            border-bottom: 3px solid #C8102E;
        }
        .modal-header h2 { color: #C8102E; font-size: 22px; }

        .close { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; transition: color 0.3s; }
        .close:hover { color: #C8102E; }

        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .modal-grid .full { grid-column: 1 / -1; }

        .detail-group { margin-bottom: 4px; }
        .detail-label {
            font-weight: 700; color: #002F6C; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
            display: flex; align-items: center; gap: 6px;
        }
        .detail-value {
            color: #333; font-size: 14px; padding: 10px 14px;
            background: #f8faff; border-radius: 8px; border-left: 3px solid #C8102E;
            min-height: 38px;
        }
        .detail-value.tags { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 14px; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px;
            background: #2ecc71; color: white; padding: 15px 25px;
            border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 2000; animation: slideInRight 0.3s;
        }
        @keyframes slideInRight { from{transform:translateX(400px);opacity:0} to{transform:translateX(0);opacity:1} }
        .toast.error { background: #e74c3c; }

        @media(max-width:768px) {
            .modal-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-list"></i> Liste des Suggestions</h1>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total">0</div>
                <div class="stat-label">Suggestions Totales</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-number" id="totalDepts">0</div>
                <div class="stat-label">Départements</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-number" id="totalEmployes">0</div>
                <div class="stat-label">Employés uniques</div>
            </div>
        </div>

        <div class="controls">
            <a class="btn-back" href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <button class="btn-refresh" onclick="chargerSuggestions()"><i class="fas fa-sync"></i> Actualiser</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Rechercher par nom, matricule, titre..." onkeyup="filterTable()">
                <i class="fas fa-search"></i>
            </div>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Chargement des suggestions...
        </div>

        <div class="table-container">
            <table id="table" style="display:none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Matricule</th>
                        <th>Employé</th>
                        <th>Département</th>
                        <th>Titre Idée</th>
                        <th>Problème</th>
                        <th>Fréquence</th>
                        <th>Zones d'Impact</th>
                        <th>KPIs Ciblés</th>
                        <th>Gain</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal détails -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-info-circle"></i> Détails de la suggestion</h2>
                <span class="close" onclick="fermerModal()">&times;</span>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let suggestions = [];
        const freqMap = {'quotidien':'Quotidienne','hebdomadaire':'Hebdomadaire','mensuel':'Mensuelle','occasionnel':'Occasionnelle'};

        async function chargerSuggestions() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('table').style.display = 'none';

            const result = await obtenirSuggestions();

            if (result.success) {
                suggestions = result.suggestions;
                document.getElementById('total').textContent = suggestions.length;
                document.getElementById('totalDepts').textContent = new Set(suggestions.map(s=>s.departement).filter(Boolean)).size;
                document.getElementById('totalEmployes').textContent = new Set(suggestions.map(s=>s.matricule)).size;

                const tbody = document.getElementById('tbody');
                tbody.innerHTML = '';

                suggestions.forEach(s => {
                    const date = new Date(s.dateCreation).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
                    const zones = (s.zonesImpact||[]).map(z=>'<span class="tag">'+z+'</span>').join('') || '<span style="color:#aaa">—</span>';
                    const kpis  = (s.kpisImpactes||[]).map(k=>'<span class="tag tag-kpi">'+k+'</span>').join('') || '<span style="color:#aaa">—</span>';

                    tbody.innerHTML += `
                        <tr id="row-${s._id}">
                            <td style="white-space:nowrap;font-size:12px;color:#666">${date}</td>
                            <td><strong>${s.matricule}</strong></td>
                            <td>${s.nom}</td>
                            <td><span class="badge badge-dept">${s.departement||'—'}</span></td>
                            <td><strong>${(s.titreIdee||'—').substring(0,40)}</strong></td>
                            <td>${(s.probleme||'—').substring(0,50)}${(s.probleme||'').length>50?'...':''}</td>
                            <td><span class="badge badge-freq">${freqMap[s.frequence]||s.frequence||'—'}</span></td>
                            <td style="max-width:160px">${zones}</td>
                            <td style="max-width:160px">${kpis}</td>
                            <td>${s.gain||'—'}</td>
                            <td style="white-space:nowrap">
                                <button class="btn-view" onclick="afficherDetails('${s._id}')"><i class="fas fa-eye"></i> Voir</button>
                                <button class="btn-delete" onclick="confirmerSuppression('${s._id}','${s.nom.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('table').style.display = 'table';
            } else {
                document.getElementById('loading').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erreur : ' + result.message;
            }
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function afficherDetails(id) {
            const s = suggestions.find(s => s._id === id);
            if (!s) return;

            const date = new Date(s.dateCreation).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
            const zonesHtml = (s.zonesImpact||[]).length > 0 ? (s.zonesImpact||[]).map(z=>'<span class="tag">'+z+'</span>').join('') : '—';
            const kpisHtml  = (s.kpisImpactes||[]).length > 0 ? (s.kpisImpactes||[]).map(k=>'<span class="tag tag-kpi">'+k+'</span>').join('') : '—';

            document.getElementById('modal-body').innerHTML = `
                <div class="modal-grid">
                    <div class="detail-group">
                        <div class="detail-label"><i class="fas fa-calendar"></i> Date de création</div>
                        <div class="detail-value">${date}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i class="fas fa-id-card"></i> Matricule</div>
                        <div class="detail-value">${s.matricule}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i class="fas fa-user"></i> Nom complet</div>
                        <div class="detail-value">${s.nom}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i class="fas fa-building"></i> Département</div>
                        <div class="detail-value">${s.departement||'—'}</div>
                    </div>
                    <div class="detail-group full">
                        <div class="detail-label"><i class="fas fa-heading"></i> Titre de l'idée</div>
                        <div class="detail-value">${s.titreIdee||'—'}</div>
                    </div>
                    <div class="detail-group full">
                        <div class="detail-label"><i class="fas fa-exclamation-triangle"></i> Problème rencontré</div>
                        <div class="detail-value">${s.probleme||'—'}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i class="fas fa-clock"></i> Fréquence</div>
                        <div class="detail-value">${freqMap[s.frequence]||s.frequence||'—'}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i class="fas fa-gauge-high"></i> Gain estimé</div>
                        <div class="detail-value">${s.gain||'—'}</div>
                    </div>
                    <div class="detail-group full">
                        <div class="detail-label"><i class="fas fa-map-marked-alt"></i> Zones d'Impact</div>
                        <div class="detail-value tags">${zonesHtml}</div>
                    </div>
                    <div class="detail-group full">
                        <div class="detail-label"><i class="fas fa-lightbulb"></i> Description de l'idée</div>
                        <div class="detail-value">${s.idee||'—'}</div>
                    </div>
                    <div class="detail-group full">
                        <div class="detail-label"><i class="fas fa-bullseye"></i> KPIs Impactés</div>
                        <div class="detail-value tags">${kpisHtml}</div>
                    </div>
                </div>`;

            document.getElementById('modal').style.display = 'block';
        }

        function fermerModal() { document.getElementById('modal').style.display = 'none'; }

        window.onclick = function(e) { if (e.target === document.getElementById('modal')) fermerModal(); }

        function confirmerSuppression(id, nom) {
            if (confirm('Êtes-vous sûr de vouloir supprimer la suggestion de "'+nom+'" ?\n\nCette action est irréversible !')) {
                supprimerSuggestion(id);
            }
        }

        async function supprimerSuggestion(id) {
            try {
                const API_URL = 'https://lear-backend.onrender.com/api';
                const response = await fetch(API_URL+'/suggestion/'+id, { method: 'DELETE' });
                const result = await response.json();

                if (result.success) {
                    const row = document.getElementById('row-'+id);
                    if (row) {
                        row.style.transition = 'all 0.3s';
                        row.style.opacity = '0';
                        row.style.transform = 'translateX(-100px)';
                        setTimeout(() => {
                            row.remove();
                            const cur = parseInt(document.getElementById('total').textContent);
                            document.getElementById('total').textContent = cur - 1;
                            if (cur - 1 === 0) chargerSuggestions();
                        }, 300);
                    }
                    afficherToast('Suggestion supprimée avec succès !', 'success');
                } else {
                    afficherToast('Erreur: ' + result.message, 'error');
                }
            } catch (err) {
                afficherToast('Erreur de connexion au serveur', 'error');
            }
        }

        function afficherToast(message, type='success') {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = '<i class="fas fa-'+(type==='success'?'check-circle':'exclamation-circle')+'"></i> ' + message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'slideInRight 0.3s reverse'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        window.onload = chargerSuggestions;
    </script>
</body>
</html>
